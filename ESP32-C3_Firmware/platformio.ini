[env:esp32]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
lib_deps = h2zero/NimBLE-Arduino@^2.1.0
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

    ; NimBLE tuning: match firmware MAX_CONNECTIONS, reduce log noise
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
    -D CONFIG_BT_NIMBLE_LOG_LEVEL=1

    ; Tell NimBLE to allow the baseband to sleep between advertisements
    -D CONFIG_BT_NIMBLE_SLEEP_ENABLE=1  ; Allows the BT radio to sleep
    -D CONFIG_BT_NIMBLE_DEBUG=0        ; Reduce CPU cycles on logging

; CPU clock: 80 MHz is plenty for BLE, ~halves active power vs 160 MHz
board_build.f_cpu = 80000000L

; Smaller SPIFFS partition = more space for app. NVS (used by Preferences)
; is separate and unaffected.
board_build.partitions = min_spiffs.csv